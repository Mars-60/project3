<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonalOS AI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .assistant-button {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 78px;
            height: 78px;
            border: 0;
            border-radius: 50%;
            background: #1f2937;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.28);
        }

        .chat-panel {
            position: fixed;
            right: 24px;
            bottom: 116px;
            width: 360px;
            max-width: calc(100vw - 48px);
            height: 480px;
            max-height: calc(100vh - 148px);
            display: none;
            flex-direction: column;
            background: #ffffff;
            border: 1px solid #d7dde5;
            border-radius: 8px;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.22);
            overflow: hidden;
        }

        .chat-panel.open {
            display: flex;
        }

        .chat-header {
            padding: 14px 16px;
            border-bottom: 1px solid #e5e9ef;
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            background: #ffffff;
        }

        .conversation {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
            background: #f8fafc;
        }

        .message {
            width: fit-content;
            max-width: 86%;
            margin-bottom: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .message.user {
            margin-left: auto;
            background: #2563eb;
            color: #ffffff;
        }

        .message.assistant {
            margin-right: auto;
            background: #ffffff;
            color: #1f2937;
            border: 1px solid #e5e9ef;
        }

        .chat-form {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid #e5e9ef;
            background: #ffffff;
        }

        .chat-input {
            flex: 1;
            min-width: 0;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #2563eb;
        }

        .send-button {
            border: 0;
            border-radius: 6px;
            padding: 0 14px;
            background: #111827;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .send-button:disabled {
            cursor: wait;
            opacity: 0.65;
        }
    </style>
</head>
<body>
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">PersonalOS AI</div>
        <div class="conversation" id="conversation"></div>
        <form class="chat-form" id="chatForm">
            <input
                class="chat-input"
                id="chatInput"
                type="text"
                placeholder="Ask PersonalOS..."
                autocomplete="off"
            >
            <button class="send-button" id="sendButton" type="submit">
                Send
            </button>
        </form>
    </div>

    <button class="assistant-button" id="assistantButton">
        PersonalOS
    </button>

    <script>
        const chatPanel = document.getElementById("chatPanel");
        const assistantButton = document.getElementById("assistantButton");
        const chatForm = document.getElementById("chatForm");
        const chatInput = document.getElementById("chatInput");
        const conversation = document.getElementById("conversation");
        const sendButton = document.getElementById("sendButton");

        assistantButton.addEventListener("click", () => {
            chatPanel.classList.toggle("open");

            if (chatPanel.classList.contains("open")) {
                chatInput.focus();
            }
        });

        function addMessage(role, text) {
            const message = document.createElement("div");

            message.className = "message " + role;
            message.textContent = text;

            conversation.appendChild(message);
            conversation.scrollTop = conversation.scrollHeight;
        }

        chatForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const question = chatInput.value.trim();

            if (!question) {
                return;
            }

            addMessage("user", question);
            chatInput.value = "";
            sendButton.disabled = true;

            try {
                const response = await fetch("http://127.0.0.1:5000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        question: question
                    })
                });

                const data = await response.json();

                if (!response.ok || data.status !== "success") {
                    throw new Error(
                        data.message || "Unable to get a response."
                    );
                }

                addMessage(
                    "assistant",
                    data.answer || "No answer returned."
                );
            } catch (error) {
                addMessage(
                    "assistant",
                    "Error: " + error.message
                );
            } finally {
                sendButton.disabled = false;
                chatInput.focus();
            }
        });
    </script>
</body>
</html>
