<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo | PersonalOS AI</title>
    <link rel="stylesheet" href="echo.css">
</head>
<body>
    <main class="page-shell" aria-label="PersonalOS AI">
        <section class="ambient-card">
            <p class="eyebrow">PersonalOS AI</p>
            <h1>Echo</h1>
            <p>Memory, activity, and learning context in one compact assistant.</p>
        </section>
    </main>

    <section class="echo-panel" id="echoPanel" aria-label="Echo chat panel">
        <header class="echo-header">
            <div class="echo-mark" aria-hidden="true">E</div>
            <div>
                <h2>Echo</h2>
                <p>Your personal memory assistant</p>
            </div>
            <button class="icon-button" id="closeButton" type="button" aria-label="Close Echo">
                x
            </button>
        </header>

        <div class="chat-scroll" id="chatScroll">
            <section class="welcome-screen" id="welcomeScreen">
                <div class="welcome-orb" aria-hidden="true">E</div>
                <h3>Echo</h3>
                <p>Your personal memory assistant</p>

                <div class="prompt-grid" aria-label="Suggested prompts">
                    <button class="prompt-card" type="button">
                        What was I studying yesterday?
                    </button>
                    <button class="prompt-card" type="button">
                        What websites did I visit?
                    </button>
                    <button class="prompt-card" type="button">
                        What did I do yesterday?
                    </button>
                    <button class="prompt-card" type="button">
                        Summarize today's activity
                    </button>
                </div>
            </section>

            <div class="messages" id="messages" aria-live="polite"></div>
        </div>

        <form class="composer" id="chatForm">
            <textarea
                id="chatInput"
                rows="1"
                placeholder="Ask Echo..."
                aria-label="Ask Echo"
            ></textarea>
            <button class="send-button" id="sendButton" type="submit" aria-label="Send message">
                Send
            </button>
        </form>
    </section>

    <button class="echo-launcher" id="echoLauncher" type="button" aria-label="Open Echo">
        <span class="launcher-glow" aria-hidden="true"></span>
        <span class="launcher-label">Echo</span>
    </button>

    <script src="echo.js"></script>
</body>
</html>
